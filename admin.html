<!DOCTYPE html>
<html lang="pt-pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Carreira &amp; Silva</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:#0B1F3A; --navy-light:#15406B; --red:#C83232; --red-soft:#fdeaea;
      --ground:#F4F5F7; --surface:#FFF; --border:#E2E5EA; --muted:#5C6478; --ink:#0B1F3A;
      --font-display:'Outfit',system-ui,sans-serif; --font-body:'Source Sans 3',system-ui,sans-serif;
      --radius:14px;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--ground); color:var(--ink); font-family:var(--font-body); }
    h1,h2,h3 { font-family:var(--font-display); }
    header { background:var(--navy); color:#fff; padding:16px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
    header .brand { display:flex; align-items:center; gap:12px; }
    header .brand-logo { width:36px; height:36px; border-radius:8px; background:var(--red); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:800; color:#fff; font-size:1rem; }
    header h1 { font-size:1.05rem; margin:0; font-weight:700; letter-spacing:.01em; }
    header .sub { font-size:.78rem; color:rgba(255,255,255,.6); font-family:var(--font-body); }
    .actions { display:flex; gap:8px; }
    button { font:inherit; font-weight:600; cursor:pointer; border-radius:8px; border:1px solid transparent; padding:9px 16px; font-family:var(--font-display); transition:background .15s,border-color .15s; }
    .btn-primary { background:var(--red); color:#fff; }
    .btn-primary:hover { background:#a82828; }
    .btn-ghost { background:transparent; color:#fff; border-color:rgba(255,255,255,.4); }
    .btn-ghost:hover { background:rgba(255,255,255,.1); }
    main { max-width:1080px; margin:0 auto; padding:24px; }

    /* Login */
    .gate { max-width:420px; margin:60px auto; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:36px; box-shadow:0 20px 50px -30px rgba(11,31,58,.4); }
    .gate h2 { margin:0 0 8px; font-size:1.4rem; }
    .gate p { color:var(--muted); margin:0 0 22px; font-size:.92rem; line-height:1.6; }
    label { display:block; font-weight:600; margin-bottom:6px; font-size:.9rem; }
    input[type=password], input[type=text], select { width:100%; padding:11px 14px; border:1px solid var(--border); border-radius:8px; font:inherit; background:#fff; color:var(--ink); }
    input:focus, select:focus { outline:none; border-color:var(--navy-light); box-shadow:0 0 0 3px rgba(21,64,107,.12); }
    .gate input { margin-bottom:16px; }
    .gate button { width:100%; }

    /* Mensagens */
    .msg { padding:14px 18px; border-radius:10px; margin:12px 0; font-weight:500; }
    .msg.err { background:#FBECEC; color:#A02020; border:1px solid #F0C8C8; }
    .msg.info { background:#EAEDF4; color:var(--navy); border:1px solid #D5DAE6; }

    /* Stat cards */
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:20px; }
    .stat { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; display:flex; align-items:center; gap:14px; }
    .stat__icon { width:44px; height:44px; border-radius:10px; background:#eaf0f8; color:var(--navy); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .stat--red .stat__icon { background:var(--red-soft); color:var(--red); }
    .stat__num { font-family:var(--font-display); font-size:1.9rem; font-weight:800; line-height:1; }
    .stat__label { font-size:.8rem; color:var(--muted); margin-top:3px; }

    /* Chart */
    .panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px 22px; margin-bottom:20px; }
    .panel__title { font-size:1rem; margin:0 0 4px; }
    .panel__hint { font-size:.8rem; color:var(--muted); margin:0 0 18px; }
    .chart { display:flex; align-items:flex-end; gap:6px; height:150px; }
    .chart__col { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:6px; height:100%; }
    .chart__bar { width:100%; max-width:34px; background:linear-gradient(var(--navy-light),var(--navy)); border-radius:5px 5px 0 0; min-height:3px; transition:height .3s; position:relative; }
    .chart__bar[data-c="0"] { background:var(--border); }
    .chart__bar:hover::after { content:attr(data-c)" pedido(s)"; position:absolute; bottom:100%; left:50%; transform:translateX(-50%); background:var(--navy); color:#fff; font-size:.72rem; padding:3px 8px; border-radius:6px; white-space:nowrap; margin-bottom:5px; }
    .chart__label { font-size:.68rem; color:var(--muted); white-space:nowrap; }

    /* Toolbar */
    .toolbar { display:flex; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
    .toolbar .search { flex:1; min-width:200px; position:relative; }
    .toolbar .search svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); }
    .toolbar .search input { padding-left:38px; }
    .toolbar select { width:auto; min-width:150px; }
    .count { font-size:.9rem; color:var(--muted); margin-bottom:14px; }
    .count strong { color:var(--ink); }

    /* Cartões de pedido */
    .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px 20px; margin-bottom:14px; }
    .card-head { display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:12px; border-bottom:1px solid var(--border); padding-bottom:10px; }
    .card-head h3 { margin:0; font-size:1.1rem; }
    .badge { display:inline-block; font-family:var(--font-display); font-size:.68rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:3px 9px; border-radius:999px; margin-left:8px; vertical-align:middle; background:#eaf0f8; color:var(--navy); }
    .badge--intl { background:var(--red-soft); color:var(--red); }
    .card-head .data { color:var(--muted); font-size:.82rem; white-space:nowrap; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:8px 20px; }
    .field { font-size:.9rem; }
    .field .k { color:var(--muted); font-size:.74rem; text-transform:uppercase; letter-spacing:.04em; display:block; }
    .msg-box { grid-column:1/-1; background:var(--ground); border-radius:8px; padding:10px 12px; margin-top:6px; white-space:pre-wrap; }

    @media (max-width:760px) {
      .stats { grid-template-columns:1fr 1fr; }
    }
    @media (max-width:460px) {
      .stats { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="brand-logo">CS</span>
      <div>
        <h1>Carreira &amp; Silva</h1>
        <span class="sub">Painel de pedidos de orçamento</span>
      </div>
    </div>
    <div class="actions" id="topActions" style="display:none;">
      <button class="btn-ghost" onclick="carregar()">Atualizar</button>
      <button class="btn-ghost" onclick="sair()">Sair</button>
    </div>
  </header>
  <main>
    <div class="gate" id="gate">
      <h2>Área reservada</h2>
      <p>Introduz a palavra-passe de administrador para veres os pedidos recebidos.</p>
      <label for="token">Palavra-passe (ADMIN_TOKEN)</label>
      <input type="password" id="token" placeholder="..." onkeydown="if(event.key==='Enter')entrar()">
      <button class="btn-primary" onclick="entrar()">Entrar</button>
    </div>

    <div id="painel" style="display:none;">
      <!-- Estatísticas -->
      <div class="stats" id="stats"></div>

      <!-- Gráfico -->
      <div class="panel" id="chartPanel" style="display:none;">
        <h2 class="panel__title">Pedidos por dia</h2>
        <p class="panel__hint">Últimos 14 dias</p>
        <div class="chart" id="chart"></div>
      </div>

      <!-- Barra de ferramentas -->
      <div class="toolbar" id="toolbar" style="display:none;">
        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" id="busca" placeholder="Procurar por nome, email, localidade..." oninput="render()">
        </div>
        <select id="filtroTipo" onchange="render()"><option value="">Todos os tipos</option></select>
        <select id="ordenar" onchange="render()">
          <option value="recente">Mais recentes</option>
          <option value="antigo">Mais antigos</option>
          <option value="nome">Nome (A–Z)</option>
        </select>
      </div>

      <div class="count" id="count"></div>
      <div id="lista"></div>
    </div>
  </main>

  <script>
    const API_BASE = (location.hostname==="localhost"||location.hostname==="127.0.0.1")
      ? "http://localhost:5000" : "https://carreira-e-silva.onrender.com";

    let TODOS = [];

    function entrar(){ const t=document.getElementById("token").value.trim(); if(!t)return; localStorage.setItem("cs_admin_token",t); mostrarPainel(); carregar(); }
    function sair(){ localStorage.removeItem("cs_admin_token"); location.reload(); }
    function mostrarPainel(){ document.getElementById("gate").style.display="none"; document.getElementById("painel").style.display="block"; document.getElementById("topActions").style.display="flex"; }

    async function carregar(){
      const token=localStorage.getItem("cs_admin_token");
      const lista=document.getElementById("lista");
      lista.innerHTML='<div class="msg info">A carregar pedidos...</div>';
      try{
        const resp=await fetch(API_BASE+"/api/orcamentos",{headers:{"X-Admin-Token":token}});
        if(resp.status===401||resp.status===403){ lista.innerHTML='<div class="msg err">Palavra-passe incorreta. Clica em "Sair" e tenta de novo.</div>'; TODOS=[]; render(); return; }
        if(!resp.ok) throw new Error("Erro "+resp.status);
        TODOS=await resp.json();
        prepararFiltroTipo();
        render();
      }catch(e){
        lista.innerHTML='<div class="msg err">Não foi possível ligar à API. Ela pode estar a "acordar" (~50s) — tenta Atualizar daqui a pouco.</div>';
      }
    }

    function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
    function ehIntl(p){ return /internacional/i.test(p.tipo||""); }

    // Preenche o filtro de tipos com os valores distintos existentes
    function prepararFiltroTipo(){
      const sel=document.getElementById("filtroTipo");
      const atual=sel.value;
      const tipos=[...new Set(TODOS.map(p=>p.tipo).filter(Boolean))].sort();
      sel.innerHTML='<option value="">Todos os tipos</option>'+tipos.map(t=>'<option value="'+esc(t)+'">'+esc(t)+'</option>').join("");
      sel.value=atual;
    }

    function render(){
      renderStats();
      renderChart();
      renderLista();
      document.getElementById("chartPanel").style.display = TODOS.length ? "block" : "none";
      document.getElementById("toolbar").style.display = TODOS.length ? "flex" : "none";
    }

    function renderStats(){
      const agora=new Date();
      const hoje0=new Date(agora.getFullYear(),agora.getMonth(),agora.getDate());
      const semana=new Date(hoje0); semana.setDate(semana.getDate()-6);
      let nHoje=0,nSemana=0,nIntl=0;
      TODOS.forEach(p=>{
        if(ehIntl(p)) nIntl++;
        if(p.criado_em){ const d=new Date(p.criado_em); if(d>=hoje0)nHoje++; if(d>=semana)nSemana++; }
      });
      const cards=[
        {icon:'<path d="M9 17V7a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v10M5 21h14M9 21v-4h6v4"/>', num:TODOS.length, label:"Total de pedidos"},
        {icon:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>', num:nHoje, label:"Hoje"},
        {icon:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>', num:nSemana, label:"Últimos 7 dias"},
        {icon:'<circle cx="12" cy="12" r="9"/><path d="M2 12h20M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/>', num:nIntl, label:"Internacionais", red:true}
      ];
      document.getElementById("stats").innerHTML=cards.map(c=>
        '<div class="stat'+(c.red?' stat--red':'')+'"><div class="stat__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="22" height="22">'+c.icon+'</svg></div><div><div class="stat__num">'+c.num+'</div><div class="stat__label">'+c.label+'</div></div></div>'
      ).join("");
    }

    function renderChart(){
      const dias=14;
      const agora=new Date();
      const base=new Date(agora.getFullYear(),agora.getMonth(),agora.getDate());
      const buckets=[];
      for(let i=dias-1;i>=0;i--){ const d=new Date(base); d.setDate(d.getDate()-i); buckets.push({d:d,c:0}); }
      TODOS.forEach(p=>{
        if(!p.criado_em) return;
        const d=new Date(p.criado_em); const d0=new Date(d.getFullYear(),d.getMonth(),d.getDate());
        const b=buckets.find(x=>x.d.getTime()===d0.getTime()); if(b)b.c++;
      });
      const max=Math.max(1,...buckets.map(b=>b.c));
      document.getElementById("chart").innerHTML=buckets.map(b=>{
        const h=Math.round((b.c/max)*100);
        const lbl=b.d.getDate()+"/"+(b.d.getMonth()+1);
        return '<div class="chart__col"><div class="chart__bar" data-c="'+b.c+'" style="height:'+h+'%"></div><span class="chart__label">'+lbl+'</span></div>';
      }).join("");
    }

    function renderLista(){
      const q=(document.getElementById("busca").value||"").toLowerCase().trim();
      const tipo=document.getElementById("filtroTipo").value;
      const ord=document.getElementById("ordenar").value;

      let arr=TODOS.filter(p=>{
        if(tipo && p.tipo!==tipo) return false;
        if(q){
          const alvo=[p.nome,p.email,p.telefone,p.codigo_postal,p.origem,p.destino].map(x=>String(x||"").toLowerCase()).join(" ");
          if(!alvo.includes(q)) return false;
        }
        return true;
      });

      arr.sort((a,b)=>{
        if(ord==="nome") return String(a.nome||"").localeCompare(String(b.nome||""));
        const ta=a.criado_em?new Date(a.criado_em).getTime():0;
        const tb=b.criado_em?new Date(b.criado_em).getTime():0;
        return ord==="antigo" ? ta-tb : tb-ta;
      });

      const count=document.getElementById("count");
      const lista=document.getElementById("lista");

      if(TODOS.length===0){ count.textContent=""; lista.innerHTML='<div class="msg info">Ainda não há pedidos.</div>'; return; }
      count.innerHTML='A mostrar <strong>'+arr.length+'</strong> de <strong>'+TODOS.length+'</strong> pedidos';
      if(arr.length===0){ lista.innerHTML='<div class="msg info">Nenhum pedido corresponde à pesquisa.</div>'; return; }
      lista.innerHTML=arr.map(cartao).join("");
    }

    function campo(k,v){ if(!v)return""; return '<div class="field"><span class="k">'+k+'</span><span>'+esc(v)+"</span></div>"; }
    function cartao(p){
      let data=""; if(p.criado_em){ data=new Date(p.criado_em).toLocaleString("pt-PT"); }
      const badge = p.tipo ? '<span class="badge'+(ehIntl(p)?' badge--intl':'')+'">'+esc(p.tipo)+'</span>' : '';
      return '<div class="card"><div class="card-head"><h3>'+esc(p.nome)+badge+'</h3><span class="data">'+data+" &middot; #"+p.id+"</span></div><div class=\"grid\">"+
        campo("Email",p.email)+campo("Telefone",p.telefone)+campo("Código postal",p.codigo_postal)+
        campo("Origem",p.origem)+campo("Destino",p.destino)+campo("Andar origem",p.andar_origem)+campo("Andar destino",p.andar_destino)+
        campo("Elevador origem",p.elevador_origem)+campo("Elevador destino",p.elevador_destino)+campo("Itens especiais",p.especial)+
        campo("Serviços",p.servico)+campo("Data preferencial",p.data)+campo("Flexibilidade",p.flexibilidade)+
        (p.itens?'<div class="field msg-box"><span class="k">Itens a transportar</span>'+esc(p.itens)+"</div>":"")+
        (p.observacoes?'<div class="field msg-box"><span class="k">Mensagem</span>'+esc(p.observacoes)+"</div>":"")+"</div></div>";
    }

    if(localStorage.getItem("cs_admin_token")){ mostrarPainel(); carregar(); }
  </script>
</body>
</html>
